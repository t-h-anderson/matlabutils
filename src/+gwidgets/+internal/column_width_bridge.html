<!DOCTYPE html>
<html>
<head>
  <style>
    body { margin: 0; overflow: hidden; background: transparent; }
  </style>
  <script>
  // ColumnWidthBridge
  //
  // JS -> MATLAB : htmlComponent.Data = {event: "...", ...}
  //               triggers DataChangedFcn in MATLAB
  //
  // MATLAB -> JS : sendEventToHTMLSource(comp, eventName, data)
  //               triggers htmlComponent.addEventListener(eventName, handler)

  var COL_SELECTOR   = ".mw-table-header-column";
  var RETRY_INTERVAL = 600;
  var DEBOUNCE_MS    = 200;
  var MAX_ATTEMPTS   = 8;

  var resizeObserver = null;
  var debounceTimer  = null;
  var paused         = false;
  var tableTag       = null;
  var htmlComponent  = null;
  var attachAttempts = 0;

  function diag(stage, detail) {
    htmlComponent.Data = { event: "BridgeDiag", stage: stage, detail: String(detail) };
  }

  function findColumns() {
    var parentDoc;
    try {
      parentDoc = window.parent.document;
    } catch (e) {
      diag("parentAccess", "FAILED: " + e.message);
      return [];
    }

    // Scope to the specific uitable by data-tag when possible, otherwise
    // fall back to the full document (fine when there is one table).
    var scope = parentDoc;
    if (tableTag) {
      var tableEl = parentDoc.querySelector('[data-tag="' + tableTag + '"]');
      if (tableEl) scope = tableEl;
    }

    return Array.from(scope.querySelectorAll(COL_SELECTOR));
  }

  function publishWidths() {
    if (paused) return;
    var cols = findColumns();
    if (cols.length === 0) return;
    var widths = cols.map(function(c) {
      return Math.round(c.getBoundingClientRect().width);
    });
    htmlComponent.Data = { event: "ColumnWidthChanged", widths: widths };
  }

  function debouncedPublish() {
    clearTimeout(debounceTimer);
    debounceTimer = setTimeout(publishWidths, DEBOUNCE_MS);
  }

  function attachObserver() {
    var cols = findColumns();
    if (cols.length === 0) {
      attachAttempts++;
      if (attachAttempts < MAX_ATTEMPTS) {
        setTimeout(attachObserver, RETRY_INTERVAL);
      }
      return;
    }
    if (resizeObserver) resizeObserver.disconnect();
    resizeObserver = new ResizeObserver(debouncedPublish);
    cols.forEach(function(col) { resizeObserver.observe(col); });
  }

  function setup(component) {
    htmlComponent = component;

    htmlComponent.addEventListener("Init", function(event) {
      tableTag = (event.Data && event.Data.tableTag) ? event.Data.tableTag : null;
      setTimeout(attachObserver, RETRY_INTERVAL);
    });

    htmlComponent.addEventListener("Pause", function(event) {
      paused = true;
      clearTimeout(debounceTimer);
      var duration = (event.Data && event.Data.durationMs) ? event.Data.durationMs : 500;
      setTimeout(function() { paused = false; }, duration);
    });

    htmlComponent.addEventListener("Reattach", function() {
      attachAttempts = 0;
      setTimeout(attachObserver, RETRY_INTERVAL);
    });

    htmlComponent.addEventListener("SetWidths", function(event) {
      // Column width in MATLAB's uitable is controlled by min-width and
      // max-width (set to the same value) on the <TH> elements inside a
      // display:flex row.  The containing <TABLE> also carries explicit
      // width/min-width/max-width inline styles that must track the column
      // sum.  We update all three to match the requested pixel widths.
      var widths = event.Data;
      if (!Array.isArray(widths)) return;
      var cols = findColumns();
      if (cols.length !== widths.length) {
        attachAttempts = 0;
        setTimeout(attachObserver, RETRY_INTERVAL);
        return;
      }

      // Compute the fixed offset = table width - sum of current column widths.
      // This accounts for any row-number column, borders, or other fixed
      // elements that are not part of findColumns().
      var headerTable = cols[0] ? cols[0].closest("table") : null;
      var fixedOffset = 0;
      if (headerTable) {
        var currentColTotal = 0;
        for (var i = 0; i < cols.length; i++) {
          currentColTotal += cols[i].getBoundingClientRect().width;
        }
        fixedOffset = Math.round(headerTable.getBoundingClientRect().width - currentColTotal);
      }

      // Apply min-width + max-width to each header column.
      var newColTotal = 0;
      for (var i = 0; i < cols.length; i++) {
        if (widths[i] < 0) {
          // "auto": remove explicit constraints and let flex decide
          cols[i].style.removeProperty("min-width");
          cols[i].style.removeProperty("max-width");
          newColTotal += cols[i].getBoundingClientRect().width;
        } else {
          cols[i].style.minWidth = widths[i] + "px";
          cols[i].style.maxWidth = widths[i] + "px";
          newColTotal += widths[i];
        }
      }

      // Update the header table's width to keep the flex row consistent.
      if (headerTable) {
        var newTableWidth = Math.round(newColTotal + fixedOffset);
        headerTable.style.width    = newTableWidth + "px";
        headerTable.style.minWidth = newTableWidth + "px";
        headerTable.style.maxWidth = newTableWidth + "px";
      }

      // Mirror the same changes on body columns so data rows match.
      // Body columns share the same index order as header columns.
      var doc = cols[0] ? cols[0].ownerDocument : window.parent.document;
      var bodyTable = null;
      if (tableTag) {
        var tableEl = doc.querySelector("[data-tag='" + tableTag + "']");
        if (tableEl) bodyTable = tableEl.querySelector("table.mw-table-body");
      }
      if (!bodyTable) bodyTable = doc.querySelector("table.mw-table-body");
      if (bodyTable) {
        var bodyRows = bodyTable.querySelectorAll("tr");
        for (var r = 0; r < bodyRows.length; r++) {
          var cells = bodyRows[r].querySelectorAll("td");
          for (var i = 0; i < cells.length && i < widths.length; i++) {
            if (widths[i] < 0) {
              cells[i].style.removeProperty("min-width");
              cells[i].style.removeProperty("max-width");
            } else {
              cells[i].style.minWidth = widths[i] + "px";
              cells[i].style.maxWidth = widths[i] + "px";
            }
          }
        }
        bodyTable.style.width    = (Math.round(newColTotal + fixedOffset)) + "px";
        bodyTable.style.minWidth = (Math.round(newColTotal + fixedOffset)) + "px";
        bodyTable.style.maxWidth = (Math.round(newColTotal + fixedOffset)) + "px";
      }

      diag("SetWidths:done", "cols=" + cols.length + " newTotal=" + newColTotal + " offset=" + fixedOffset + " bodyTable=" + !!bodyTable);
    });

    // Signal MATLAB that setup() has run and it is safe to send Init.
    htmlComponent.Data = { event: "BridgeReady" };
  }
  </script>
</head>
<body></body>
</html>
