<!DOCTYPE html>
<html>
<head>
  <style>
    body { margin: 0; overflow: hidden; background: transparent; }
  </style>
  <script>
  // ColumnWidthBridge
  //
  // JS -> MATLAB : htmlComponent.Data = {event: "...", ...}
  //               triggers DataChangedFcn in MATLAB
  //
  // MATLAB -> JS : sendEventToHTMLSource(comp, eventName, data)
  //               triggers htmlComponent.addEventListener(eventName, handler)

  var COL_SELECTOR   = ".tabulator-col:not(.tabulator-col-group)";
  var RETRY_INTERVAL = 600;
  var DEBOUNCE_MS    = 200;

  var resizeObserver = null;
  var debounceTimer  = null;
  var paused         = false;
  var tableTag       = null;
  var htmlComponent  = null;

  function diag(stage, detail) {
    htmlComponent.Data = { event: "BridgeDiag", stage: stage, detail: String(detail) };
  }

  function findColumns() {
    var parentDoc;
    try {
      parentDoc = window.parent.document;
    } catch (e) {
      diag("parentAccess", "FAILED: " + e.message);
      return [];
    }

    var scope = parentDoc;
    if (tableTag) {
      var tableEl = parentDoc.querySelector('[data-tag="' + tableTag + '"]');
      scope = tableEl || parentDoc;
      diag("scopedSearch", tableEl ? "scoped to tag" : "tag not found, using document");
    }

    return Array.from(scope.querySelectorAll(COL_SELECTOR));
  }

  function publishWidths() {
    if (paused) return;
    var cols = findColumns();
    if (cols.length === 0) return;
    var widths = cols.map(function(c) {
      return Math.round(c.getBoundingClientRect().width);
    });
    htmlComponent.Data = { event: "ColumnWidthChanged", widths: widths };
  }

  function debouncedPublish() {
    clearTimeout(debounceTimer);
    debounceTimer = setTimeout(publishWidths, DEBOUNCE_MS);
  }

  var hasExploredDom = false;

  function exploreDom() {
    // Runs once to report what is actually in the parent DOM so we can
    // work out the correct CSS selector and tag attribute name.
    if (hasExploredDom) return;
    hasExploredDom = true;

    var parentDoc = window.parent.document;

    // 1. Collect all unique class names that look table/column related.
    var allEls = parentDoc.querySelectorAll("*");
    var seen = {};
    for (var i = 0; i < allEls.length; i++) {
      allEls[i].classList.forEach(function(cls) { seen[cls] = true; });
    }
    var relevant = Object.keys(seen).filter(function(c) {
      return /col|header|table|row|cell|mw-/i.test(c);
    });
    diag("domClasses", relevant.slice(0, 30).join(", ") || "(none)");

    // 2. Report which data-* attributes exist across the first 200 elements
    //    so we can find which one stores the MATLAB Tag value.
    var dataAttrs = {};
    var limit = Math.min(allEls.length, 200);
    for (var j = 0; j < limit; j++) {
      var el = allEls[j];
      for (var k = 0; k < el.attributes.length; k++) {
        var attr = el.attributes[k];
        if (attr.name.indexOf("data-") === 0) {
          dataAttrs[attr.name] = (dataAttrs[attr.name] || 0) + 1;
        }
      }
    }
    diag("dataAttrs", JSON.stringify(dataAttrs));
  }

  var attachAttempts = 0;
  var MAX_ATTACH_ATTEMPTS = 8;

  function attachObserver() {
    var cols = findColumns();
    if (cols.length === 0) {
      attachAttempts++;
      if (attachAttempts === 1) {
        exploreDom();  // dump DOM info on first failure only
      }
      if (attachAttempts < MAX_ATTACH_ATTEMPTS) {
        setTimeout(attachObserver, RETRY_INTERVAL);
      } else {
        diag("attachObserver", "giving up after " + MAX_ATTACH_ATTEMPTS + " attempts — check domClasses output above");
      }
      return;
    }
    if (resizeObserver) resizeObserver.disconnect();
    resizeObserver = new ResizeObserver(debouncedPublish);
    cols.forEach(function(col) { resizeObserver.observe(col); });
    diag("attachObserver", "OK - observing " + cols.length + " columns");
  }

  function setup(component) {
    htmlComponent = component;

    htmlComponent.addEventListener("Init", function(event) {
      tableTag = (event.Data && event.Data.tableTag) ? event.Data.tableTag : null;
      diag("initReceived", "tableTag=" + tableTag);
      setTimeout(attachObserver, RETRY_INTERVAL);
    });

    htmlComponent.addEventListener("Pause", function(event) {
      paused = true;
      clearTimeout(debounceTimer);
      var duration = (event.Data && event.Data.durationMs) ? event.Data.durationMs : 500;
      setTimeout(function() { paused = false; }, duration);
    });

    htmlComponent.addEventListener("Reattach", function() {
      attachAttempts = 0;
      hasExploredDom = false;
      setTimeout(attachObserver, RETRY_INTERVAL);
    });

    // Signal MATLAB that setup() has run and it is safe to send Init.
    htmlComponent.Data = { event: "BridgeReady" };
  }
  </script>
</head>
<body></body>
</html>
