<!DOCTYPE html>
<html>
<head>
  <style>
    body { margin: 0; overflow: hidden; background: transparent; }
  </style>
  <script>
  // Minimal diagnostic version — no window.parent access.
  // Purpose: verify the basic JS <-> MATLAB channel works before adding
  // any DOM observation logic.  Check the MATLAB command window for output.

  var htmlComponent = null;

  function setup(component) {
    htmlComponent = component;

    // Step 1: confirm setup() was called and the channel is open.
    htmlComponent.dispatchEvent(
      new CustomEvent("BridgeDiag", {
        detail: { stage: "setup", detail: "setup() called OK" }
      })
    );

    // Step 2: register the Init listener and fire BridgeReady so MATLAB
    // knows it can now safely send Init.
    htmlComponent.addEventListener("Init", function (event) {
      htmlComponent.dispatchEvent(
        new CustomEvent("BridgeDiag", {
          detail: {
            stage: "initReceived",
            detail: "tableTag=" + JSON.stringify(event.Data)
          }
        })
      );

      // Step 3: test whether window.parent.document is accessible.
      var parentAccessible;
      try {
        var _ = window.parent.document.body;
        parentAccessible = "YES";
      } catch (e) {
        parentAccessible = "NO — " + e.message;
      }

      htmlComponent.dispatchEvent(
        new CustomEvent("BridgeDiag", {
          detail: { stage: "parentAccess", detail: parentAccessible }
        })
      );
    });

    htmlComponent.dispatchEvent(
      new CustomEvent("BridgeReady", { detail: {} })
    );
  }
  </script>
</head>
<body></body>
</html>
