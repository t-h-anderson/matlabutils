<!DOCTYPE html>
<html>
<head>
  <style>
    body { margin: 0; overflow: hidden; background: transparent; }
  </style>
  <script>
  // Absolute minimal test — no window.parent, no ResizeObserver.
  // Just verifies that setup() is called and that both outbound channels
  // (CustomEvent/HTMLEventReceivedFcn AND Data/DataChangedFcn) work.

  function setup(component) {

    // Channel A: CustomEvent -> HTMLEventReceivedFcn
    component.dispatchEvent(
      new CustomEvent("BridgeDiag", {
        detail: { stage: "setup", detail: "channel A (CustomEvent)" }
      })
    );

    // Channel B: Data property -> DataChangedFcn
    component.Data = { stage: "setup", detail: "channel B (Data)" };
  }
  </script>
</head>
<body></body>
</html>
