<!DOCTYPE html>
<html>
<head>
  <style>
    body { margin: 0; overflow: hidden; background: transparent; }
  </style>
  <script>
  // ColumnWidthBridge

  var COL_SELECTOR   = ".mw-table-header-column";
  var RETRY_INTERVAL = 600;
  var DEBOUNCE_MS    = 200;
  var MAX_ATTEMPTS   = 8;

  var resizeObserver    = null;
  var mutationObserver  = null;
  var debounceTimer     = null;
  var paused            = false;
  var autoMode          = false;
  var echoSuppressUntil = 0;
  var tableTag          = null;
  var htmlComponent     = null;
  var attachAttempts    = 0;
  var observedCols      = [];
  // Baseline column widths (px) when autoMode is active and MATLAB has fully
  // rendered.  Used to distinguish a user column drag (one column changed)
  // from a window resize (all columns changed proportionally).
  var lastAutoWidths    = null;

  var t0 = Date.now();  // reference timestamp for relative timing
  function ts() { return "t+" + (Date.now() - t0) + "ms"; }

  // Diagnostic log queue
  var diagQueue     = [];
  var diagFlushTimer = null;
  function bridgeLog(msg) {
    console.log(msg);
    diagQueue.push(msg);
    clearTimeout(diagFlushTimer);
    diagFlushTimer = setTimeout(function() {
      if (diagQueue.length === 0 || !htmlComponent) return;
      var out = diagQueue.join("\n");
      diagQueue = [];
      htmlComponent.Data = { event: "BridgeDiag", msg: out };
    }, 10);
  }

  // ---- DOM inspection helpers ----

  function colWidthsFromDOM(cols) {
    return cols.map(function(c) {
      var r = c.getBoundingClientRect();
      return Math.round(r.width);
    });
  }

  function colStyleStr(col) {
    var s = col.style;
    return "[mw=" + (s.minWidth||"–") + " mxw=" + (s.maxWidth||"–") + "]";
  }

  function tableStyleStr(t) {
    if (!t) return "null";
    var s = t.style;
    var r = t.getBoundingClientRect();
    return "w=" + Math.round(r.width) + "px" +
           " style[w=" + (s.width||"–") +
           " mw=" + (s.minWidth||"–") +
           " mxw=" + (s.maxWidth||"–") + "]";
  }

  function bodyCellStyleStr(bodyTable, n) {
    // Report first row, first n cells
    if (!bodyTable) return "no-body";
    var row = bodyTable.querySelector("tr");
    if (!row) return "no-rows";
    var cells = row.querySelectorAll("td");
    var parts = [];
    for (var i = 0; i < Math.min(cells.length, n); i++) {
      var s = cells[i].style;
      parts.push("cell[" + i + "]: mw=" + (s.minWidth||"–") + " mxw=" + (s.maxWidth||"–") +
                 " rect=" + Math.round(cells[i].getBoundingClientRect().width) + "px");
    }
    return cells.length + " td's; " + parts.join("; ");
  }

  // ---- Core functions ----

  function findColumns() {
    var parentDoc;
    try { parentDoc = window.parent.document; } catch (e) { return []; }
    var scope = parentDoc;
    if (tableTag) {
      var tableEl = parentDoc.querySelector('[data-tag="' + tableTag + '"]');
      if (tableEl) scope = tableEl;
    }
    return Array.from(scope.querySelectorAll(COL_SELECTOR));
  }

  function findBodyTable(doc) {
    if (tableTag) {
      var tableEl = doc.querySelector('[data-tag="' + tableTag + '"]');
      if (tableEl) {
        var t = tableEl.querySelector("table.mw-table");
        if (t) return t;
      }
    }
    return doc.querySelector("table.mw-table");
  }

  function applyColumnWidths(widths) {
    var mode = widths.every(function(w) { return w >= 0; }) ? "pixel" :
               widths.every(function(w) { return w <  0; }) ? "auto"  : "mixed";
    bridgeLog("[Bridge] " + ts() + " applyColumnWidths: mode=" + mode +
              " widths=[" + widths.join(", ") + "]" +
              " paused=" + paused +
              " echoWindowMs=" + Math.max(0, echoSuppressUntil - Date.now()));

    var cols = findColumns();
    if (cols.length !== widths.length) {
      bridgeLog("[Bridge] " + ts() + " applyColumnWidths: col count mismatch" +
                " (have " + cols.length + ", want " + widths.length + ") — scheduling reattach");
      attachAttempts = 0;
      setTimeout(function() { attachObserver("mismatch"); }, RETRY_INTERVAL);
      return;
    }

    var doc = cols.length > 0 ? cols[0].ownerDocument : window.parent.document;
    var allPixel = widths.every(function(w) { return w >= 0; });
    var allAuto  = widths.every(function(w) { return w <  0; });

    autoMode = allAuto;
    if (allAuto) {
      echoSuppressUntil = Date.now() + 400;
      lastAutoWidths = null;  // will be populated once MATLAB's render settles
      bridgeLog("[Bridge] " + ts() + " applyColumnWidths: echoSuppressUntil set +400ms");
    }

    var headerTable = cols.length > 0 ? cols[0].closest("table") : null;

    // Log header state BEFORE changes
    bridgeLog("[Bridge] " + ts() + " applyColumnWidths: header BEFORE:" +
              " table=" + tableStyleStr(headerTable) +
              " cols=" + colWidthsFromDOM(cols).join(","));

    var fixedOffset = 0;
    if (headerTable && allPixel) {
      var currentColTotal = 0;
      for (var i = 0; i < cols.length; i++) currentColTotal += cols[i].getBoundingClientRect().width;
      fixedOffset = Math.round(headerTable.getBoundingClientRect().width - currentColTotal);
      bridgeLog("[Bridge] " + ts() + " applyColumnWidths: fixedOffset=" + fixedOffset +
                " (tableW=" + Math.round(headerTable.getBoundingClientRect().width) +
                " colTotal=" + Math.round(currentColTotal) + ")");
    }

    // --- Header columns ---
    var newColTotal = 0;
    for (var i = 0; i < cols.length; i++) {
      if (widths[i] < 0) {
        cols[i].style.removeProperty("min-width");
        cols[i].style.removeProperty("max-width");
      } else {
        cols[i].style.minWidth = widths[i] + "px";
        cols[i].style.maxWidth = widths[i] + "px";
        newColTotal += widths[i];
      }
    }
    if (headerTable) {
      if (allPixel) {
        var newTableWidth = Math.round(newColTotal + fixedOffset);
        headerTable.style.width    = newTableWidth + "px";
        headerTable.style.minWidth = newTableWidth + "px";
        headerTable.style.maxWidth = newTableWidth + "px";
      } else if (allAuto) {
        headerTable.style.removeProperty("width");
        headerTable.style.removeProperty("min-width");
        headerTable.style.removeProperty("max-width");
      }
    }

    // Log header state AFTER changes (forces reflow)
    bridgeLog("[Bridge] " + ts() + " applyColumnWidths: header AFTER:" +
              " table=" + tableStyleStr(headerTable) +
              " cols=" + colWidthsFromDOM(cols).join(","));

    // --- Body columns ---
    var bodyTable = findBodyTable(doc);
    bridgeLog("[Bridge] " + ts() + " applyColumnWidths: bodyTable=" + (bodyTable ? "found" : "NOT FOUND") +
              (bodyTable ? (" " + tableStyleStr(bodyTable)) : ""));
    if (bodyTable) {
      bridgeLog("[Bridge] " + ts() + " applyColumnWidths: body BEFORE: " +
                bodyCellStyleStr(bodyTable, cols.length));
    }

    if (bodyTable) {
      if (allAuto) {
        var bodyRows = bodyTable.querySelectorAll("tr");
        for (var r = 0; r < bodyRows.length; r++) {
          var cells = bodyRows[r].querySelectorAll("td");
          for (var i = 0; i < cells.length; i++) {
            cells[i].style.removeProperty("min-width");
            cells[i].style.removeProperty("max-width");
          }
        }
        bodyTable.style.removeProperty("width");
        bodyTable.style.removeProperty("min-width");
        bodyTable.style.removeProperty("max-width");
        bridgeLog("[Bridge] " + ts() + " applyColumnWidths: body constraints removed," +
                  " table now=" + tableStyleStr(bodyTable));
      } else {
        var bodyRows = bodyTable.querySelectorAll("tr");
        for (var r = 0; r < bodyRows.length; r++) {
          var cells = bodyRows[r].querySelectorAll("td");
          for (var i = 0; i < cells.length && i < widths.length; i++) {
            cells[i].style.minWidth = widths[i] + "px";
            cells[i].style.maxWidth = widths[i] + "px";
          }
        }
        if (allPixel) {
          var bw = Math.round(newColTotal + fixedOffset);
          bodyTable.style.width    = bw + "px";
          bodyTable.style.minWidth = bw + "px";
          bodyTable.style.maxWidth = bw + "px";
        }
        bridgeLog("[Bridge] " + ts() + " applyColumnWidths: body AFTER: " +
                  bodyCellStyleStr(bodyTable, cols.length));
      }
    }

    if (allAuto) {
      bridgeLog("[Bridge] " + ts() + " applyColumnWidths: scheduling RAF sync");
      requestAnimationFrame(function() {
        bridgeLog("[Bridge] " + ts() + " RAF fired: autoMode=" + autoMode +
                  " echoWindowMs=" + Math.max(0, echoSuppressUntil - Date.now()));
        if (autoMode) { syncBodyWithHeader("raf"); }
        else { bridgeLog("[Bridge] " + ts() + " RAF: autoMode=false, skip"); }
      });
    }

    bridgeLog("[Bridge] " + ts() + " applyColumnWidths: calling attachObserver");
    attachObserver("SetWidths-sync");
    setupMutationObserver();
  }

  function setupMutationObserver() {
    if (mutationObserver) { mutationObserver.disconnect(); mutationObserver = null; }
    var cols = findColumns();
    if (cols.length === 0) return;
    var headerTable = cols[0].closest("table");
    if (!headerTable) return;

    mutationObserver = new MutationObserver(function(mutations) {
      var rerendered = mutations.some(function(m) {
        if (m.type !== "childList" || m.removedNodes.length === 0) return false;
        return Array.from(m.removedNodes).some(function(n) {
          return n.nodeType === 1 && (
            (n.classList && n.classList.contains("mw-table-header-column")) ||
            (n.querySelector && n.querySelector(".mw-table-header-column") !== null)
          );
        });
      });
      if (rerendered) {
        bridgeLog("[Bridge] " + ts() + " MutationObserver: header re-rendered — re-attaching");
        setTimeout(function() { attachObserver("mutation"); }, 50);
      }
    });
    mutationObserver.observe(headerTable, { childList: true, subtree: true });
  }

  function syncBodyWithHeader(label) {
    var cols = findColumns();
    if (cols.length === 0) {
      bridgeLog("[Bridge] " + ts() + " syncBodyWithHeader(" + label + "): no cols found");
      return;
    }
    var widths = colWidthsFromDOM(cols);
    var headerTable = cols[0].closest("table");
    var doc = cols[0].ownerDocument;
    var bodyTable = findBodyTable(doc);

    bridgeLog("[Bridge] " + ts() + " syncBodyWithHeader(" + label + "):" +
              " headerCols=" + widths.join(",") +
              " headerTable=" + tableStyleStr(headerTable) +
              " bodyTable=" + (bodyTable ? tableStyleStr(bodyTable) : "NOT FOUND"));

    if (!bodyTable) return;

    bridgeLog("[Bridge] " + ts() + " syncBodyWithHeader(" + label + "): body BEFORE: " +
              bodyCellStyleStr(bodyTable, cols.length));

    if (headerTable) {
      var hTableWidth = Math.round(headerTable.getBoundingClientRect().width);
      bodyTable.style.width    = hTableWidth + "px";
      bodyTable.style.minWidth = hTableWidth + "px";
      bodyTable.style.maxWidth = hTableWidth + "px";
    }
    var bodyRows = bodyTable.querySelectorAll("tr");
    for (var r = 0; r < bodyRows.length; r++) {
      var cells = bodyRows[r].querySelectorAll("td");
      for (var ci = 0; ci < cells.length && ci < widths.length; ci++) {
        cells[ci].style.minWidth = widths[ci] + "px";
        cells[ci].style.maxWidth = widths[ci] + "px";
      }
    }

    bridgeLog("[Bridge] " + ts() + " syncBodyWithHeader(" + label + "): body AFTER: " +
              bodyCellStyleStr(bodyTable, cols.length));
  }

  // Return indices of columns whose width changed by more than DRAG_THRESHOLD px.
  // If last is null (no baseline yet) every index is returned, which causes the
  // caller to treat the event as a window resize and suppress MATLAB notification.
  var DRAG_THRESHOLD = 2;
  function getChangedColumns(current, last) {
    if (!last || last.length !== current.length) {
      return current.map(function(_, i) { return i; });
    }
    var changed = [];
    for (var i = 0; i < current.length; i++) {
      if (Math.abs(current[i] - last[i]) > DRAG_THRESHOLD) changed.push(i);
    }
    return changed;
  }

  function publishWidths() {
    var now = Date.now();
    var echoMs = Math.max(0, echoSuppressUntil - now);

    // Auto mode: body is synced live in debouncedPublish on every fire.
    // Here we only need to decide whether to notify MATLAB:
    //   - echo window or paused → MATLAB is already applying widths; suppress notification.
    //   - user drag (paused=false, echoMs=0) → notify MATLAB so DataColumnWidth_ updates
    //     to the dragged pixel widths (transitions out of "1x" mode).
    //
    // The pause prevents MATLAB notification (no ColumnWidthChanged sent),
    // but the body tracks the header live via debouncedPublish.  MATLAB's
    // own "1x" rendering fires the ResizeObserver within the 1200 ms Pause
    // window but after the 400 ms echo window:
    //   t+0   ms  applyColumnWidths: header 104→82 px; echo window opens (400ms)
    //   t+228 ms  echo sync: body→82 px  (echoMs>0)
    //   t+447 ms  MATLAB renders 1x: header 82→104 px; ResizeObserver fires
    //   t+650 ms  publishWidths: echoMs=0, paused=true → suppress (no MATLAB notify)
    //             body already synced live: body→104 px
    if (autoMode) {
      if (paused || echoMs > 0) {
        bridgeLog("[Bridge] " + ts() + " publishWidths: auto-mode suppressed" +
                  " (echoMs=" + echoMs + " paused=" + paused + ")");
        return;
      }
      // User interaction (drag) or window resize.  Use lastAutoWidths to tell them apart:
      //   - exactly 1 column changed  → user dragged that column
      //   - 0 or multiple changed     → window resize (all columns scaled proportionally)
      var cols = findColumns();
      if (cols.length === 0) return;
      var currentWidths = colWidthsFromDOM(cols);
      var changedIdxs = getChangedColumns(currentWidths, lastAutoWidths);
      lastAutoWidths = currentWidths;   // update baseline for future comparisons
      if (changedIdxs.length !== 1) {
        // Window resize — body is already synced live; suppress MATLAB notification
        // so DataColumnWidth_ keeps its "nx" values.
        bridgeLog("[Bridge] " + ts() + " publishWidths: auto-mode window-resize" +
                  " (changed=" + changedIdxs.length + " cols) — suppressed");
        return;
      }
      // Single column changed → user drag.  Send a partial-update array:
      //   positive value  for the dragged column (new pixel width)
      //   -1              for every other column (keep existing "nx" value in MATLAB)
      var dragIdx = changedIdxs[0];
      var jsWidths = currentWidths.map(function(w, i) { return i === dragIdx ? w : -1; });
      bridgeLog("[Bridge] " + ts() + " publishWidths: auto-mode user drag" +
                " col=" + dragIdx + " → " + currentWidths[dragIdx] + "px" +
                " jsWidths=[" + jsWidths.join(",") + "]");
      autoMode = false;
      htmlComponent.Data = { event: "ColumnWidthChanged", widths: jsWidths };
      return;
    }
    if (paused) {
      bridgeLog("[Bridge] " + ts() + " publishWidths: SUPPRESSED (paused=true, echoMs=" + echoMs + ")");
      return;
    }
    if (now < echoSuppressUntil) {
      bridgeLog("[Bridge] " + ts() + " publishWidths: SUPPRESSED (pixel echo, echoMs=" + echoMs + ")");
      return;
    }

    // Guard: stale observed elements
    if (observedCols.length > 0 && !observedCols[0].isConnected) {
      bridgeLog("[Bridge] " + ts() + " publishWidths: observed cols detached — re-attaching");
      attachObserver("stale");
      return;
    }

    var cols = findColumns();
    if (cols.length === 0) {
      bridgeLog("[Bridge] " + ts() + " publishWidths: no cols found");
      return;
    }
    var widths = colWidthsFromDOM(cols);
    var headerTable = cols[0].closest("table");
    var doc = cols[0].ownerDocument;
    var bodyTable = findBodyTable(doc);

    bridgeLog("[Bridge] " + ts() + " publishWidths: PUBLISH widths=[" + widths.join(", ") + "]" +
              " autoMode=" + autoMode +
              " headerTable=" + tableStyleStr(headerTable));
    bridgeLog("[Bridge] " + ts() + " publishWidths: body BEFORE: " +
              bodyCellStyleStr(bodyTable, cols.length));

    // Stamp header cells
    for (var i = 0; i < cols.length; i++) {
      cols[i].style.minWidth = widths[i] + "px";
      cols[i].style.maxWidth = widths[i] + "px";
    }
    // Stamp body cells
    if (bodyTable) {
      var bodyRows = bodyTable.querySelectorAll("tr");
      for (var r = 0; r < bodyRows.length; r++) {
        var cells = bodyRows[r].querySelectorAll("td");
        for (var ci = 0; ci < cells.length && ci < widths.length; ci++) {
          cells[ci].style.minWidth = widths[ci] + "px";
          cells[ci].style.maxWidth = widths[ci] + "px";
        }
      }
      bridgeLog("[Bridge] " + ts() + " publishWidths: body AFTER: " +
                bodyCellStyleStr(bodyTable, cols.length));
    }

    autoMode = false;
    htmlComponent.Data = { event: "ColumnWidthChanged", widths: widths };
  }

  function debouncedPublish() {
    var echoMs = Math.max(0, echoSuppressUntil - Date.now());
    bridgeLog("[Bridge] " + ts() + " debouncedPublish: ResizeObserver fired" +
              " (debounce " + DEBOUNCE_MS + "ms)" +
              " paused=" + paused +
              " autoMode=" + autoMode +
              " echoWindowMs=" + echoMs);
    if (autoMode) {
      // Sync body immediately on every fire so it tracks the header live during drag.
      // This bypasses the debounce delay for visual fidelity.
      syncBodyWithHeader("drag-live");
      if (paused || echoMs > 0) {
        // Echo / MATLAB-render path: body sync is all we need, no MATLAB notification.
        // Snapshot the current widths as the settled baseline so that when the user
        // later drags a column we can tell which one changed.
        var echoCols = findColumns();
        if (echoCols.length > 0) lastAutoWidths = colWidthsFromDOM(echoCols);
        return;
      }
      // User drag or window resize: body already synced above; fall through to schedule
      // debounced publishWidths so it can distinguish the two cases.
    }
    clearTimeout(debounceTimer);
    debounceTimer = setTimeout(publishWidths, DEBOUNCE_MS);
  }

  function attachObserver(label) {
    var cols = findColumns();
    var info = "found=" + cols.length +
               (cols.length ? (" connected=" + cols[0].isConnected +
                               " colWidths=[" + colWidthsFromDOM(cols).join(",") + "]") : "");
    bridgeLog("[Bridge] " + ts() + " attachObserver(" + (label||"") + "): " + info);
    if (cols.length === 0) {
      attachAttempts++;
      if (attachAttempts < MAX_ATTEMPTS) {
        setTimeout(function() { attachObserver("retry"); }, RETRY_INTERVAL);
      }
      return;
    }
    observedCols = cols;
    if (resizeObserver) resizeObserver.disconnect();
    resizeObserver = new ResizeObserver(debouncedPublish);
    cols.forEach(function(col) { resizeObserver.observe(col); });
  }

  function setup(component) {
    htmlComponent = component;

    htmlComponent.addEventListener("Init", function(event) {
      tableTag = (event.Data && event.Data.tableTag) ? event.Data.tableTag : null;
      bridgeLog("[Bridge] " + ts() + " Init received: tableTag=" + tableTag);
      setTimeout(function() { attachObserver("Init"); }, RETRY_INTERVAL);
    });

    htmlComponent.addEventListener("Pause", function(event) {
      paused = true;
      clearTimeout(debounceTimer);
      var duration = (event.Data && event.Data.durationMs) ? event.Data.durationMs : 500;
      echoSuppressUntil = Date.now() + duration;
      bridgeLog("[Bridge] " + ts() + " Pause received: duration=" + duration +
                "ms, echoSuppressUntil set +" + duration + "ms");
      setTimeout(function() {
        paused = false;
        bridgeLog("[Bridge] " + ts() + " Pause expired (paused→false)");
      }, duration);
    });

    htmlComponent.addEventListener("Reattach", function() {
      bridgeLog("[Bridge] " + ts() + " Reattach received");
      attachAttempts = 0;
      setTimeout(function() { attachObserver("Reattach"); }, RETRY_INTERVAL);
    });

    htmlComponent.addEventListener("SetWidths", function(event) {
      var widths = event.Data;
      bridgeLog("[Bridge] " + ts() + " SetWidths received: " + JSON.stringify(widths));
      if (!Array.isArray(widths)) return;
      applyColumnWidths(widths);
    });

    htmlComponent.Data = { event: "BridgeReady" };
  }
  </script>
</head>
<body></body>
</html>
