<!DOCTYPE html>
<html>
<head>
  <style>
    body { margin: 0; overflow: hidden; background: transparent; }
  </style>
  <script>
  // ColumnWidthBridge
  //
  // JS -> MATLAB : htmlComponent.Data = {event: "...", ...}
  //               triggers DataChangedFcn in MATLAB
  //
  // MATLAB -> JS : sendEventToHTMLSource(comp, eventName, data)
  //               triggers htmlComponent.addEventListener(eventName, handler)

  var COL_SELECTOR   = ".mw-table-header-column";
  var RETRY_INTERVAL = 600;
  var DEBOUNCE_MS    = 200;
  var MAX_ATTEMPTS   = 8;

  var resizeObserver    = null;
  var mutationObserver  = null;
  var debounceTimer     = null;
  var paused            = false;
  var autoMode          = false;  // true when all column widths are CSS-auto (-1)
  var echoSuppressUntil = 0;      // Date.now() ms — suppress publishWidths before this
  var tableTag          = null;
  var htmlComponent     = null;
  var attachAttempts    = 0;
  var observedCols      = [];  // elements the ResizeObserver is currently watching

  // Diagnostic log queue — batched into a single htmlComponent.Data event
  // so rapid synchronous calls don't overwrite each other.
  var diagQueue     = [];
  var diagFlushTimer = null;
  function bridgeLog(msg) {
    console.log(msg);  // still useful if dev tools ever become accessible
    diagQueue.push(msg);
    clearTimeout(diagFlushTimer);
    diagFlushTimer = setTimeout(function() {
      if (diagQueue.length === 0 || !htmlComponent) return;
      var out = diagQueue.join("\n");
      diagQueue = [];
      htmlComponent.Data = { event: "BridgeDiag", msg: out };
    }, 10);
  }

  function findColumns() {
    var parentDoc;
    try {
      parentDoc = window.parent.document;
    } catch (e) {
      return [];
    }

    // Scope to the specific uitable by data-tag when possible, otherwise
    // fall back to the full document (fine when there is one table).
    var scope = parentDoc;
    if (tableTag) {
      var tableEl = parentDoc.querySelector('[data-tag="' + tableTag + '"]');
      if (tableEl) scope = tableEl;
    }

    return Array.from(scope.querySelectorAll(COL_SELECTOR));
  }

  function findBodyTable(doc) {
    if (tableTag) {
      var tableEl = doc.querySelector('[data-tag="' + tableTag + '"]');
      if (tableEl) {
        var t = tableEl.querySelector("table.mw-table");
        if (t) return t;
      }
    }
    return doc.querySelector("table.mw-table");
  }

  function applyColumnWidths(widths) {
    // widths: numeric array — positive = px, negative = auto (remove constraint)
    var mode = widths.every(function(w) { return w >= 0; }) ? "pixel" :
               widths.every(function(w) { return w <  0; }) ? "auto"  : "mixed";
    bridgeLog("[Bridge] applyColumnWidths: mode=" + mode + " widths=[" + widths.join(", ") + "]");
    var cols = findColumns();
    if (cols.length !== widths.length) {
      // Column count mismatch (e.g. mid-visibility-toggle). Reattach and wait.
      bridgeLog("[Bridge] applyColumnWidths: col count mismatch (have " + cols.length + ", want " + widths.length + ") — scheduling reattach");
      attachAttempts = 0;
      setTimeout(function() { attachObserver("mismatch"); }, RETRY_INTERVAL);
      return;
    }

    var doc = cols.length > 0 ? cols[0].ownerDocument : window.parent.document;
    var allPixel = widths.every(function(w) { return w >= 0; });
    var allAuto  = widths.every(function(w) { return w <  0; });

    // Track mode and set a JS-side echo suppression window.
    // We cannot rely solely on the Pause event arriving before the first
    // publishWidths fires: MATLAB's DisplayTable.ColumnWidth setter goes
    // through its own rendering pipeline and fires our ResizeObserver
    // ~200 ms before our Pause event is delivered.  The suppression window
    // below stops any publishWidths that fires within that race.
    autoMode = allAuto;
    if (allAuto) {
      // 400 ms > 200 ms debounce + plausible event-delivery latency.
      echoSuppressUntil = Date.now() + 400;
    }

    // Fixed offset = table width - sum of column widths (accounts for any
    // non-data columns such as a row-number column). Only meaningful when
    // all columns currently have explicit pixel widths.
    var headerTable = cols.length > 0 ? cols[0].closest("table") : null;
    var fixedOffset = 0;
    if (headerTable && allPixel) {
      var currentColTotal = 0;
      for (var i = 0; i < cols.length; i++) {
        currentColTotal += cols[i].getBoundingClientRect().width;
      }
      fixedOffset = Math.round(headerTable.getBoundingClientRect().width - currentColTotal);
    }

    // --- Header columns ---
    // Width is controlled by matching min-width and max-width on the <TH>
    // elements inside a display:flex row. Setting style.width has no effect.
    var newColTotal = 0;
    for (var i = 0; i < cols.length; i++) {
      if (widths[i] < 0) {
        cols[i].style.removeProperty("min-width");
        cols[i].style.removeProperty("max-width");
      } else {
        cols[i].style.minWidth = widths[i] + "px";
        cols[i].style.maxWidth = widths[i] + "px";
        newColTotal += widths[i];
      }
    }
    // Keep the header <table> width in sync so the flex row fills correctly.
    // For all-pixel: set an explicit table width.
    // For all-auto: remove any previous explicit table width so MATLAB's
    //   natural layout governs (without this the table stays pinned to its old
    //   pixel width, preventing auto columns from reflowing correctly).
    if (headerTable) {
      if (allPixel) {
        var newTableWidth = Math.round(newColTotal + fixedOffset);
        headerTable.style.width    = newTableWidth + "px";
        headerTable.style.minWidth = newTableWidth + "px";
        headerTable.style.maxWidth = newTableWidth + "px";
      } else if (allAuto) {
        headerTable.style.removeProperty("width");
        headerTable.style.removeProperty("min-width");
        headerTable.style.removeProperty("max-width");
      }
    }

    // --- Body columns ---
    // Body cells (td) use the same min-width / max-width mechanism.
    // Note: with virtual scrolling only visible rows are in the DOM;
    // newly rendered rows will be patched the next time SetWidths fires.
    var bodyTable = findBodyTable(doc);
    if (bodyTable) {
      if (allAuto) {
        // The header and body are independent <table> elements whose flex
        // layouts would auto-size columns based on different content.  To
        // keep them aligned: force a reflow to read the header's auto-sized
        // widths, then pin the body cells to those values.
        var autoWidths = cols.map(function(c) {
          return Math.round(c.getBoundingClientRect().width);
        });
        var bodyRows = bodyTable.querySelectorAll("tr");
        for (var r = 0; r < bodyRows.length; r++) {
          var cells = bodyRows[r].querySelectorAll("td");
          for (var i = 0; i < cells.length && i < autoWidths.length; i++) {
            cells[i].style.minWidth = autoWidths[i] + "px";
            cells[i].style.maxWidth = autoWidths[i] + "px";
          }
        }
        // Match the body table width to the header table width.
        if (headerTable) {
          var hTableWidth = Math.round(headerTable.getBoundingClientRect().width);
          bodyTable.style.width    = hTableWidth + "px";
          bodyTable.style.minWidth = hTableWidth + "px";
          bodyTable.style.maxWidth = hTableWidth + "px";
        }
      } else {
        var bodyRows = bodyTable.querySelectorAll("tr");
        for (var r = 0; r < bodyRows.length; r++) {
          var cells = bodyRows[r].querySelectorAll("td");
          for (var i = 0; i < cells.length && i < widths.length; i++) {
            cells[i].style.minWidth = widths[i] + "px";
            cells[i].style.maxWidth = widths[i] + "px";
          }
        }
        if (allPixel) {
          var bw = Math.round(newColTotal + fixedOffset);
          bodyTable.style.width    = bw + "px";
          bodyTable.style.minWidth = bw + "px";
          bodyTable.style.maxWidth = bw + "px";
        }
      }
    }

    // Re-anchor the ResizeObserver to the current DOM elements.
    // The sync call covers the case where the DOM is already up-to-date.
    // A MutationObserver then watches for MATLAB to asynchronously replace
    // the <TH> nodes — if that happens, it triggers a fresh attach.
    // This replaces the old "delayed attachObserver × 2" approach, which
    // fired ResizeObserver echoes that arrived after the 500 ms pause had
    // expired and falsely overwrote "1x" values with pixel values.
    attachObserver("SetWidths-sync");
    setupMutationObserver();
  }

  function setupMutationObserver() {
    if (mutationObserver) { mutationObserver.disconnect(); mutationObserver = null; }
    var cols = findColumns();
    if (cols.length === 0) return;
    var headerTable = cols[0].closest("table");
    if (!headerTable) return;

    mutationObserver = new MutationObserver(function(mutations) {
      // Only re-anchor when a column-header node was actually removed from
      // the DOM, which indicates MATLAB replaced the <TH> elements.
      var rerendered = mutations.some(function(m) {
        if (m.type !== "childList" || m.removedNodes.length === 0) return false;
        return Array.from(m.removedNodes).some(function(n) {
          return n.nodeType === 1 && (
            (n.classList && n.classList.contains("mw-table-header-column")) ||
            (n.querySelector && n.querySelector(".mw-table-header-column") !== null)
          );
        });
      });
      if (rerendered) {
        bridgeLog("[Bridge] MutationObserver: header re-rendered — re-attaching");
        setTimeout(function() { attachObserver("mutation"); }, 50);
      }
    });
    mutationObserver.observe(headerTable, { childList: true, subtree: true });
  }

  function publishWidths() {
    if (paused) return;
    // JS-side echo suppression: MATLAB's rendering pipeline fires the
    // ResizeObserver before our Pause event can arrive, so we keep our own
    // time-based window.  Any publish within 400 ms of entering auto mode is
    // treated as a layout-echo, not a genuine user drag.
    if (Date.now() < echoSuppressUntil) {
      bridgeLog("[Bridge] publishWidths: suppressed (auto-mode echo window)");
      return;
    }
    // Guard: if the elements we're observing have been detached (MATLAB
    // re-rendered the DOM), quietly re-anchor and skip this stale publish.
    if (observedCols.length > 0 && !observedCols[0].isConnected) {
      bridgeLog("[Bridge] publishWidths: observed cols detached — re-attaching");
      attachObserver("stale");
      return;
    }
    var cols = findColumns();
    if (cols.length === 0) return;
    var widths = cols.map(function(c) {
      return Math.round(c.getBoundingClientRect().width);
    });
    bridgeLog("[Bridge] publishWidths: [" + widths.join(", ") + "]");

    // Stamp measured header widths as explicit pixels on both header <th>
    // and body <td> elements.  This is safe here because we only reach this
    // point for genuine user drag events (echoes are suppressed above).
    //
    // In auto ("1x") mode the body <td>s have no explicit min-width, so
    // MATLAB's drag handler cannot anchor them when the user moves the
    // divider.  Stamping here transitions both tables from flex-auto to
    // pixel layout on the first drag, keeping them permanently in sync.
    //
    // NOTE: We do NOT set the table-level width here.  In auto mode
    // getBoundingClientRect().width on the <table> returns the full
    // container width, which would stretch the header past the columns.
    // MATLAB's applyColumnWidths (via SetWidths) owns table-level widths.
    var headerTable = cols.length > 0 ? cols[0].closest("table") : null;
    for (var i = 0; i < cols.length; i++) {
      cols[i].style.minWidth = widths[i] + "px";
      cols[i].style.maxWidth = widths[i] + "px";
    }
    if (headerTable) {
      var doc = cols[0].ownerDocument;
      var bodyTable = findBodyTable(doc);
      if (bodyTable) {
        var bodyRows = bodyTable.querySelectorAll("tr");
        for (var r = 0; r < bodyRows.length; r++) {
          var cells = bodyRows[r].querySelectorAll("td");
          for (var ci = 0; ci < cells.length && ci < widths.length; ci++) {
            cells[ci].style.minWidth = widths[ci] + "px";
            cells[ci].style.maxWidth = widths[ci] + "px";
          }
        }
      }
    }
    // First genuine drag while autoMode exits auto mode.
    autoMode = false;

    htmlComponent.Data = { event: "ColumnWidthChanged", widths: widths };
  }

  function debouncedPublish() {
    clearTimeout(debounceTimer);
    debounceTimer = setTimeout(publishWidths, DEBOUNCE_MS);
  }

  function attachObserver(label) {
    var cols = findColumns();
    var info = "found=" + cols.length +
               (cols.length ? " connected=" + cols[0].isConnected : "");
    bridgeLog("[Bridge] attachObserver(" + (label || "") + "): " + info);
    if (cols.length === 0) {
      attachAttempts++;
      if (attachAttempts < MAX_ATTEMPTS) {
        setTimeout(function() { attachObserver("retry"); }, RETRY_INTERVAL);
      }
      return;
    }
    observedCols = cols;
    if (resizeObserver) resizeObserver.disconnect();
    resizeObserver = new ResizeObserver(debouncedPublish);
    cols.forEach(function(col) { resizeObserver.observe(col); });
  }

  function setup(component) {
    htmlComponent = component;

    htmlComponent.addEventListener("Init", function(event) {
      tableTag = (event.Data && event.Data.tableTag) ? event.Data.tableTag : null;
      setTimeout(function() { attachObserver("Init"); }, RETRY_INTERVAL);
    });

    htmlComponent.addEventListener("Pause", function(event) {
      paused = true;
      clearTimeout(debounceTimer);
      var duration = (event.Data && event.Data.durationMs) ? event.Data.durationMs : 500;
      // Set the JS-side echo suppression window from here too.
      // applyColumnWidths() sets it when SetWidths arrives, but Pause is
      // sent first and typically arrives before the ResizeObserver echo fires.
      // Belt-and-suspenders: whichever arrives first wins.
      echoSuppressUntil = Date.now() + duration;
      setTimeout(function() { paused = false; }, duration);
    });

    htmlComponent.addEventListener("Reattach", function() {
      attachAttempts = 0;
      setTimeout(function() { attachObserver("Reattach"); }, RETRY_INTERVAL);
    });

    htmlComponent.addEventListener("SetWidths", function(event) {
      // MATLAB sends a numeric array: positive values are pixel widths,
      // negative means "auto" (remove explicit constraints, let CSS decide).
      var widths = event.Data;
      if (!Array.isArray(widths)) return;
      applyColumnWidths(widths);
    });

    // Signal MATLAB that setup() has run and it is safe to send Init.
    htmlComponent.Data = { event: "BridgeReady" };
  }
  </script>
</head>
<body></body>
</html>
