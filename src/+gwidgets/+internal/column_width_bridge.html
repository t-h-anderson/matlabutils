<!DOCTYPE html>
<html>
<head>
  <style>
    body { margin: 0; overflow: hidden; background: transparent; }
  </style>
  <script>
  // ColumnWidthBridge — reads uitable column widths from the parent frame's DOM
  // and publishes them back to MATLAB when the user resizes a column.
  //
  // Limitations / things that may need tuning:
  //   - Requires same-origin access to window.parent.document (true for
  //     MATLAB uifigure, which serves everything from localhost).
  //   - The CSS selector '.tabulator-col' targets MATLAB R2022b+ uitables;
  //     adjust COL_SELECTOR if your version uses different class names.
  //   - The 'data-tag' attribute is set by MATLAB on the uitable's root DOM
  //     node; if this changes in a future release, the table won't be scoped.

  (function () {
    "use strict";

    const COL_SELECTOR     = ".tabulator-col:not(.tabulator-col-group)";
    const RETRY_INTERVAL   = 600;   // ms between DOM-search retries
    const DEBOUNCE_MS      = 200;   // ms to debounce rapid resize events

    let resizeObserver = null;
    let debounceTimer  = null;
    let paused         = false;
    let tableTag       = null;      // set via 'Init' event from MATLAB
    let htmlComponent  = null;      // set by setup()

    // ------------------------------------------------------------------ //
    //  DOM helpers                                                         //
    // ------------------------------------------------------------------ //

    function findColumns() {
      let parentDoc;
      try {
        parentDoc = window.parent.document;
      } catch (e) {
        // Cross-origin — cannot access parent frame.
        console.warn("ColumnWidthBridge: cross-origin parent, cannot access DOM.", e);
        return [];
      }

      // Narrow search to the specific uitable element when a tag is known.
      let scope = parentDoc;
      if (tableTag) {
        const tableEl = parentDoc.querySelector('[data-tag="' + tableTag + '"]');
        if (tableEl) scope = tableEl;
      }

      return Array.from(scope.querySelectorAll(COL_SELECTOR));
    }

    // ------------------------------------------------------------------ //
    //  Publishing                                                          //
    // ------------------------------------------------------------------ //

    function publishWidths() {
      if (paused) return;
      const cols = findColumns();
      if (cols.length === 0) return;
      const widths = cols.map(function (c) {
        return Math.round(c.getBoundingClientRect().width);
      });
      htmlComponent.dispatchEvent(
        new CustomEvent("ColumnWidthChanged", { detail: { widths: widths } })
      );
    }

    function debouncedPublish() {
      clearTimeout(debounceTimer);
      debounceTimer = setTimeout(publishWidths, DEBOUNCE_MS);
    }

    // ------------------------------------------------------------------ //
    //  Observer attachment                                                 //
    // ------------------------------------------------------------------ //

    function attachObserver() {
      const cols = findColumns();
      if (cols.length === 0) {
        // Table hasn't rendered yet; retry after a short delay.
        setTimeout(attachObserver, RETRY_INTERVAL);
        return;
      }

      if (resizeObserver) resizeObserver.disconnect();
      resizeObserver = new ResizeObserver(debouncedPublish);
      cols.forEach(function (col) { resizeObserver.observe(col); });
    }

    // ------------------------------------------------------------------ //
    //  MATLAB component interface                                          //
    // ------------------------------------------------------------------ //

    // setup() is called automatically by MATLAB when the uihtml page loads.
    // htmlComponent is injected by the runtime and is used for bidirectional
    // communication:
    //   MATLAB → JS : sendEventToHTMLSource(comp, eventName, data)
    //                 → htmlComponent.addEventListener(eventName, handler)
    //   JS → MATLAB : htmlComponent.dispatchEvent(new CustomEvent(...))
    //                 → comp.HTMLEventReceivedFcn fires with event.HTMLEventData
    function setup(component) {
      htmlComponent = component;

      // 'Init' — sent by MATLAB after setup() completes.
      //   data.tableTag : string Tag of the uitable, used to scope DOM queries.
      htmlComponent.addEventListener("Init", function (event) {
        tableTag = (event.Data && event.Data.tableTag) ? event.Data.tableTag : null;
        setTimeout(attachObserver, RETRY_INTERVAL);
      });

      // 'Pause' — sent by MATLAB before it pushes column widths programmatically,
      // so that the resulting DOM resize events don't feed back as user changes.
      //   data.durationMs : how long to stay paused (default: 500 ms).
      htmlComponent.addEventListener("Pause", function (event) {
        paused = true;
        clearTimeout(debounceTimer);
        const duration = (event.Data && event.Data.durationMs) ? event.Data.durationMs : 500;
        setTimeout(function () { paused = false; }, duration);
      });

      // 'Reattach' — sent by MATLAB when the table data changes and columns
      // may have been added/removed, requiring the observer to be rebuilt.
      htmlComponent.addEventListener("Reattach", function () {
        setTimeout(attachObserver, RETRY_INTERVAL);
      });
    }
  </script>
</head>
<body></body>
</html>
